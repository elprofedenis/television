<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comentarios – Video 5 | Unidad Narrativa Vertical</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #080808;
      --accent:  #FF3C5F;
      --accent2: #FFD600;
      --accent3: #00EAFF;
      --text:    #F0F0F0;
      --muted:   #666;
      --radius:  16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(255,60,95,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,234,255,.13) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 540px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 52px 24px;
      gap: 32px;
    }

    .hidden { display: none !important; }

    /* ── branding ── */
    .brand {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      text-align: center;
    }
    .brand-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent3);
      background: rgba(0,234,255,.1);
      padding: 6px 18px; border-radius: 99px;
      border: 1px solid rgba(0,234,255,.3);
    }
    .brand-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(34px, 8vw, 54px);
      line-height: .92; letter-spacing: 3px; color: var(--text);
    }
    .brand-title span {
      -webkit-text-stroke: 0.5px var(--accent);
      color: transparent;
    }
    .brand-video {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(58px, 16vw, 96px);
      letter-spacing: 4px; line-height: 1;
      color: var(--accent2);
      text-shadow: 0 0 48px rgba(255,214,0,.5);
    }

    /* ── card ── */
    .card {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      padding: 36px 32px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      backdrop-filter: blur(12px);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 2px;
      color: var(--text); text-align: center;
    }

    textarea {
      width: 100%; min-height: 180px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; line-height: 1.65;
      padding: 16px 18px; resize: vertical;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus {
      border-color: rgba(255,60,95,.45);
      box-shadow: 0 0 0 3px rgba(255,60,95,.08);
    }
    textarea::placeholder { color: var(--muted); }

    .btn-send {
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
      padding: 15px 0; border-radius: var(--radius);
      width: 100%;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-send:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,60,95,.45); }
    .btn-send:active { transform: scale(.97); }
    .btn-send:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

    .status-msg {
      font-size: 13px; text-align: center;
      min-height: 18px; transition: color .2s;
    }
    .status-msg.error { color: var(--accent); }
    .status-msg.muted { color: var(--muted); }

    /* ── thanks ── */
    #screen-thanks {
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }
    .thanks-emoji { font-size: 72px; line-height: 1; }
    .thanks-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 9vw, 58px);
      letter-spacing: 2px;
      color: var(--accent2);
      text-shadow: 0 0 36px rgba(255,214,0,.45);
    }
    .thanks-sub {
      font-size: 15px; color: var(--muted);
      line-height: 1.75; max-width: 360px;
    }
    .thanks-sub strong { color: var(--accent2); }


    /* ── like / dislike ── */
    .vote-row {
      display: flex; gap: 16px; justify-content: center;
      width: 100%;
    }
    .vote-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      padding: 14px 10px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      user-select: none;
    }
    .vote-btn .vote-icon { font-size: 32px; line-height: 1; transition: transform .2s; }
    .vote-btn:hover { transform: translateY(-2px); }
    .vote-btn.selected-like {
      border-color: #00e676;
      background: rgba(0,230,118,.1);
      color: #00e676;
    }
    .vote-btn.selected-dislike {
      border-color: var(--accent);
      background: rgba(255,60,95,.1);
      color: var(--accent);
    }
    .vote-btn.selected-like .vote-icon   { transform: scale(1.2); }
    .vote-btn.selected-dislike .vote-icon { transform: scale(1.2); }
    @media (max-width: 480px) {
      .page  { padding: 40px 16px; }
      .card  { padding: 28px 18px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- branding -->
  <div class="brand">
    <div class="brand-tag">📽️ Trabajo Práctico 2</div>
    <div class="brand-title">Unidad <span>Narrativa</span> Vertical</div>
    <div class="brand-video">VIDEO 5</div>
  </div>

  <!-- ══ FORM ══ -->
  <div id="screen-form" class="card">
    <div class="card-title">¿Qué te pareció el Video 5?</div>
    <div class="vote-row">
      <button class="vote-btn" id="btnLike" onclick="selectVote('like')">
        <span class="vote-icon">👍</span>
        <span class="vote-label">Me gustó</span>
      </button>
      <button class="vote-btn" id="btnDislike" onclick="selectVote('dislike')">
        <span class="vote-icon">👎</span>
        <span class="vote-label">No me gustó</span>
      </button>
    </div>
    <textarea
      id="commentText"
      placeholder="Podés opinar, hacer aportes, bardear, usar emojis, lo que quieras siempre y cuando le sirva al grupo 🎬"
      autofocus
    ></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendComment()">Enviar</button>
    <p id="statusMsg" class="status-msg muted"></p>
  </div>

  <!-- ══ THANKS ══ -->
  <div id="screen-thanks" class="hidden">
    <div class="thanks-emoji">🙌</div>
    <div class="thanks-title">¡Gracias por comentar!</div>
    <p class="thanks-sub">
      ¡En un rato leeremos los comentarios!
    </p>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAqW6S3_qDM-hH2yTfYUpLypSujfO65l8IMhUBKAuh2JDPDKn2WKHNm7lrqqB2quUl/exec';
  const SHEET_NAME      = 'V05';           // hoja del Google Sheets
  const VIDEO_KEY       = 'tp2_commented_v05'; // clave localStorage (evita doble envío)
  // ────────────────────────────────────────────────────────────

  // Si ya comentó en este dispositivo, ir directo al agradecimiento
  if (localStorage.getItem(VIDEO_KEY)) {
    document.getElementById('screen-form').classList.add('hidden');
    document.getElementById('screen-thanks').classList.remove('hidden');
  }

  let selectedVote = null; // 'like' | 'dislike' | null

  function selectVote(v) {
    selectedVote = (selectedVote === v) ? null : v;
    document.getElementById('btnLike').classList.toggle('selected-like', selectedVote === 'like');
    document.getElementById('btnDislike').classList.toggle('selected-dislike', selectedVote === 'dislike');
  }


  async function sendComment() {
    const text   = document.getElementById('commentText').value.trim();
    const status = document.getElementById('statusMsg');
    const btn    = document.getElementById('sendBtn');

    if (!text) {
      status.textContent = 'Escribí algo antes de enviar 😊';
      status.className   = 'status-msg error';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Enviando…';
    status.textContent = '';

    try {
      // Enviamos al Apps Script (no-cors porque Google Script no devuelve CORS headers en todos los casos)
      await fetch(APPS_SCRIPT_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          hoja:    SHEET_NAME,
          texto:   text,
          like:    selectedVote === 'like'    ? 'X' : '',
          dislike: selectedVote === 'dislike' ? 'X' : ''
        })
      });

      // no-cors no nos deja leer la respuesta, pero si no lanzó error = llegó
      localStorage.setItem(VIDEO_KEY, '1');
      showThanks();

    } catch (err) {
      status.textContent = 'Error al enviar. Revisá tu conexión e intentá de nuevo.';
      status.className   = 'status-msg error';
      btn.disabled    = false;
      btn.textContent = 'Enviar';
    }
  }

  function showThanks() {
    document.getElementById('screen-form').classList.add('hidden');
    document.getElementById('screen-thanks').classList.remove('hidden');
  }
</script>
</body>
</html>
